version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-pppk40313}
      MYSQL_DATABASE: dishdash_food_app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./dishdash_new_schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5006:5006"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pppk40313}
      MYSQL_DATABASE: dishdash_food_app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
